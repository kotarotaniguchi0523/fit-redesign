name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
        timeout-minutes: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          version: 11.5.0
        timeout-minutes: 2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm
        timeout-minutes: 2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        timeout-minutes: 3

      - name: Lint and format check
        run: pnpm check
        timeout-minutes: 1

      - name: TypeScript check
        run: pnpm typecheck:full
        timeout-minutes: 2

      - name: Test
        run: pnpm test:run
        timeout-minutes: 2

      - name: Check unused code
        run: pnpm knip
        timeout-minutes: 1

      - name: Build
        run: pnpm build
        timeout-minutes: 3

      - name: Check for broken links
        uses: lycheeverse/lychee-action@a8c4c7cb88f0c7386610c35eb25108e448569cb0 # v2.7.0
        with:
          args: --offline --verbose './dist/**/*.html'
          fail: true
        timeout-minutes: 2
