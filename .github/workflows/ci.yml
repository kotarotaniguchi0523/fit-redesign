name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false
        timeout-minutes: 2

      - name: Detect D1 migration changes
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          mkdir -p /tmp/d1-migration-state

          if ! git cat-file -e "$BEFORE_SHA^{commit}"; then
            echo "true" > /tmp/d1-migration-state/changed
            exit 0
          fi

          if git diff --quiet "$BEFORE_SHA" "$CURRENT_SHA" -- migrations/; then
            echo "false" > /tmp/d1-migration-state/changed
          else
            echo "true" > /tmp/d1-migration-state/changed
          fi
        timeout-minutes: 1

      - name: Upload D1 migration state
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: d1-migration-state
          path: /tmp/d1-migration-state/changed
          retention-days: 1
        timeout-minutes: 1

      - name: Prepare D1 migration files
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p /tmp/d1-migration-files
          cp wrangler.jsonc /tmp/d1-migration-files/wrangler.jsonc
          cp -R migrations /tmp/d1-migration-files/migrations
        timeout-minutes: 1

      - name: Upload D1 migration files
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: d1-migration-files
          path: /tmp/d1-migration-files
          retention-days: 1
        timeout-minutes: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          version: 11.5.0
        timeout-minutes: 2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm
        timeout-minutes: 2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        timeout-minutes: 3

      - name: Lint and format check
        run: pnpm check
        timeout-minutes: 1

      - name: TypeScript check
        run: pnpm typecheck:full
        timeout-minutes: 2

      - name: Test
        run: pnpm test:run
        timeout-minutes: 2

      - name: Check unused code
        run: pnpm knip
        timeout-minutes: 1

      - name: Build
        run: pnpm build
        timeout-minutes: 3

      - name: Check for broken links
        uses: lycheeverse/lychee-action@a8c4c7cb88f0c7386610c35eb25108e448569cb0 # v2.7.0
        with:
          args: --offline --verbose './dist/**/*.html'
          fail: true
        timeout-minutes: 2

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pages-dist
          path: dist
          retention-days: 1
        timeout-minutes: 1
