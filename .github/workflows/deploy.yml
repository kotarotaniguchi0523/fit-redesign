name: Deploy to Cloudflare Pages

on:
  workflow_run:
    workflows:
      - D1 Migrations
    types:
      - completed

permissions: read-all

jobs:
  deploy:
    if: github.event.workflow_run.actor.login == 'kotarotaniguchi0523' && github.event.workflow_run.event == 'workflow_run' && github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      - name: Download production deploy state
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: production-deploy-state
          path: /tmp/production-deploy-state
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        timeout-minutes: 1

      - name: Download Pages artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ci_run_id="$(cat /tmp/production-deploy-state/ci-run-id)"
          gh run download "$ci_run_id" --name pages-dist --dir dist
        timeout-minutes: 2

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@9681c2997648301493e78cacbfb790a9f19c833f # v3.9.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=fit-redesign
        timeout-minutes: 3
