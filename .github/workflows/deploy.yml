name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
        timeout-minutes: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          version: 11.5.0
        timeout-minutes: 2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm
        timeout-minutes: 2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        timeout-minutes: 3

      - name: Lint and format check
        run: pnpm check
        timeout-minutes: 1

      - name: TypeScript check
        # astro check は advancedRouting 下で worker introspection が非決定的に
        # "Network connection lost" でフレークする（型エラーではない）。最大 3 回まで再試行し、
        # ゲートの完全性（真の型エラーは 3 回とも落ちる）を保ったままフレークだけ吸収する。
        run: |
          for attempt in 1 2 3; do
            echo "::group::typecheck:full (attempt ${attempt}/3)"
            if pnpm typecheck:full; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "typecheck:full failed on attempt ${attempt} (known advancedRouting flake?), retrying..."
          done
          echo "typecheck:full failed after 3 attempts"
          exit 1
        timeout-minutes: 7

      - name: Test
        run: pnpm test:run
        timeout-minutes: 2

      - name: Check unused code
        run: pnpm knip
        timeout-minutes: 1

      - name: Build
        # astro build も同じ worker introspection フレークを起こし得るため同様に最大 3 回再試行する。
        run: |
          for attempt in 1 2 3; do
            echo "::group::build (attempt ${attempt}/3)"
            if pnpm build; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "build failed on attempt ${attempt} (known advancedRouting flake?), retrying..."
          done
          echo "build failed after 3 attempts"
          exit 1
        timeout-minutes: 9

      - name: Check for broken links
        uses: lycheeverse/lychee-action@a8c4c7cb88f0c7386610c35eb25108e448569cb0 # v2.7.0
        with:
          args: --offline --verbose './dist/**/*.html'
          fail: true
        timeout-minutes: 2

      - name: Detect D1 migration changes
        id: d1-migrations
        env:
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          if ! git cat-file -e "$BEFORE_SHA^{commit}"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --quiet "$BEFORE_SHA" "$CURRENT_SHA" -- migrations/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
        timeout-minutes: 1

      - name: Apply D1 migrations
        if: steps.d1-migrations.outputs.changed == 'true'
        uses: cloudflare/wrangler-action@9681c2997648301493e78cacbfb790a9f19c833f # v3.9.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply fit-timer-db --remote
        timeout-minutes: 3

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@9681c2997648301493e78cacbfb790a9f19c833f # v3.9.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=fit-redesign
        timeout-minutes: 3
